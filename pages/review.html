<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="home.css">

    <script src="nav_bar.js" defer></script>
    <style>
        .fp-cart-badge { display: none !important; }
        body { background: #f5f5f5; display: flex; flex-direction: column; min-height: 100vh; padding-top: 80px; }

        .review-page {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }

        .review-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .review-card h2 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }

        .review-card h2 span { color: #2ecc71; }

        .review-card .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #2ecc71;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* Star Rating */
        .star-rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
            gap: 6px;
        }

        .star-rating input { display: none; }

        .star-rating label {
            font-size: 2rem;
            color: #ddd;
            cursor: pointer;
            transition: color 0.2s;
            margin: 0;
            font-weight: normal;
        }

        .star-rating input:checked ~ label,
        .star-rating label:hover,
        .star-rating label:hover ~ label {
            color: #f4c542;
        }

        .char-count {
            text-align: right;
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 4px;
        }

        .submit-btn {
            width: 100%;
            background: #2ecc71;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            margin-top: 10px;
        }

        .submit-btn:hover { background: #27ae60; }
        .submit-btn:active { transform: scale(0.98); }
        .submit-btn:disabled { background: #aaa; cursor: not-allowed; }

        .alert {
            padding: 14px;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
            margin-bottom: 20px;
            display: none;
        }
        .alert.success { background: #d4edda; color: #155724; display: block; }
        .alert.error   { background: #f8d7da; color: #721c24; display: block; }

        .back-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
        }
        .back-link a { color: #2ecc71; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="m1"> 
            <i class="fa-solid fa-leaf fa-2xl"></i>
            <div class="logo">
                <h2>FreshPlate</h2>
                <span>Eat Clean. Feel Strong.</span>
            </div>
        </div>

        <nav class="nav-links2">
            <a href="home.html">Home</a>
            <a href="home.html#menu">Menu</a>
            <a href="meal-planner.html">Meal Planner</a>
            <a href="build_meal.php">Build Meal</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>

        <div class="nav-right">
            <div style="position:relative;display:inline-block;cursor:pointer" onclick="toggleCart()">
              <i class="fa-solid fa-cart-shopping"></i>
              <span id="cart-count" style="display:none;position:absolute;top:-5px;right:-5px;background:#2ecc71;color:white;border-radius:50%;padding:2px 6px;font-size:12px;font-weight:bold;">0</span>
            </div>
            <button class="login-btn3" onclick="window.location.href='sign_in.html'">Login</button>
            <div class="hamburger" aria-label="Menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </header>

<div class="review-page">
    <div class="review-card">
        <h2>Share Your <span>Experience</span></h2>
        <p class="subtitle">Your feedback helps us serve you better 🙏</p>

        <div class="alert" id="alert-box"></div>

        <div class="form-group">
            <label>Your Name</label>
            <input type="text" id="review-name" placeholder="e.g. John Smith" maxlength="100">
        </div>

        <div class="form-group">
            <label>Rating</label>
            <div class="star-rating">
                <input type="radio" id="s5" name="rating" value="5" checked>
                <label for="s5">★</label>
                <input type="radio" id="s4" name="rating" value="4">
                <label for="s4">★</label>
                <input type="radio" id="s3" name="rating" value="3">
                <label for="s3">★</label>
                <input type="radio" id="s2" name="rating" value="2">
                <label for="s2">★</label>
                <input type="radio" id="s1" name="rating" value="1">
                <label for="s1">★</label>
            </div>
        </div>

        <div class="form-group">
            <label>Your Review</label>
            <textarea id="review-comment" placeholder="Tell us about your experience..." maxlength="500"></textarea>
            <div class="char-count"><span id="char-num">0</span> / 500</div>
        </div>

        <button class="submit-btn" id="submit-btn" onclick="submitReview()">Submit Review</button>

        <div class="back-link">
            <a href="home.html">← Back to Home</a>
        </div>
    </div>
</div>

<script>
    // عداد الحروف
    document.getElementById('review-comment').addEventListener('input', function() {
        document.getElementById('char-num').textContent = this.value.length;
    });

    async function submitReview() {
        const btn     = document.getElementById('submit-btn');
        const alertEl = document.getElementById('alert-box');
        const name    = document.getElementById('review-name').value.trim();
        const rating  = document.querySelector('input[name="rating"]:checked').value;
        const comment = document.getElementById('review-comment').value.trim();

        // إخفاء أي رسالة سابقة
        alertEl.className = 'alert';
        alertEl.textContent = '';

        if (!name || !comment) {
            alertEl.className = 'alert error';
            alertEl.textContent = 'Please fill in your name and review.';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Submitting...';

        try {
            const res = await fetch('api/reviews/add.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ name, rating: parseInt(rating), comment })
            });

            const data = await res.json();

            if (data.success) {
                alertEl.className = 'alert success';
                alertEl.textContent = '✅ ' + data.message;
                // مسح الفورم
                document.getElementById('review-name').value = '';
                document.getElementById('review-comment').value = '';
                document.getElementById('char-num').textContent = '0';
                document.querySelector('input[name="rating"][value="5"]').checked = true;
            } else {
                alertEl.className = 'alert error';
                alertEl.textContent = '❌ ' + data.message;
            }
        } catch (err) {
            alertEl.className = 'alert error';
            alertEl.textContent = '❌ Something went wrong. Please try again.';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Submit Review';
        }
    }
</script>

</body>
</html>
